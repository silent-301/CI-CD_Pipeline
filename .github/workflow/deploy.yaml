name: Deploy to AWS EC2 via Docker Compose

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest # Keeps using the GitHub Ubuntu worker image

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure SSH Key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          known_hosts: 'placeholder'
          
      - name: Add EC2 to Known Hosts
        run: ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      # 1. Sync the codebase (including docker-compose.yml) to EC2
      - name: Sync Files to EC2
        run: |
          rsync -avz --delete \
            --exclude '.git*' \
            --exclude '.github*' \
            ./ ec2-user@${{ secrets.SERVER_HOST }}:/home/ec2-user/my-app/

      # 2. Tell EC2 to build and run the containers via Docker Compose
      - name: Execute Docker Compose on EC2
        run: |
          ssh ec2-user@${{ secrets.SERVER_HOST }} "
            cd /home/ec2-user/my-app/ &&
            # Rebuild the images and launch the containers in detached (background) mode
            docker compose up -d --build
          "